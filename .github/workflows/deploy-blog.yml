name: Deploy blog to GitHub Pages repo

on:
  push:
    branches: [main]
    paths:
      - "websites/blog/**"
  workflow_dispatch:

jobs:
  deploy-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BLOG_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
      - name: Push blog subtree
        run: git push "git@github.com:typemd/blog.git" $(git subtree split --prefix=websites/blog):refs/heads/main --force
