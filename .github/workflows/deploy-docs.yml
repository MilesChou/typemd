name: Deploy docs to GitHub Pages repo

on:
  push:
    branches: [main]
    paths:
      - "websites/docs/**"
  workflow_dispatch:

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DOCS_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
      - name: Push docs subtree
        run: git push "git@github.com:typemd/docs.git" $(git subtree split --prefix=websites/docs):refs/heads/main --force
