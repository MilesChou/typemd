name: Deploy subtree to GitHub Pages repos

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/**"
  workflow_dispatch:

jobs:
  deploy-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SITE_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
      - name: Push site subtree
        run: git push "git@github.com:typemd/typemd.io.git" $(git subtree split --prefix=site):refs/heads/main --force

  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DOCS_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
      - name: Push docs subtree
        run: git push "git@github.com:typemd/docs.git" $(git subtree split --prefix=docs):refs/heads/main --force
