name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v

      - name: Vet
        run: go vet ./...

      - name: Validate examples
        run: |
          for vault in examples/*/; do
            echo "Validating ${vault}..."
            go run ./cmd/tmd --vault "${vault}" type validate
          done
