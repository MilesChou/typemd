name: Publish Marketplace

on:
  push:
    branches: [main]
    paths:
      - "marketplace/**"
  workflow_dispatch:

concurrency:
  group: publish-marketplace
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MARKETPLACE_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Push marketplace subtree
        run: git push "git@github.com:typemd/marketplace.git" $(git subtree split --prefix=marketplace):refs/heads/main --force
