version: 2

builds:
  - main: ./cmd/tmd
    binary: tmd
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/typemd/typemd/cmd.Version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "tmd-{{ .Os }}-{{ if eq .Arch \"amd64\" }}x64{{ else }}{{ .Arch }}{{ end }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "SHA256SUMS.txt"
  algorithm: sha256

changelog:
  sort: asc

brews:
  - name: typemd-cli
    directory: Formula
    repository:
      owner: typemd
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://typemd.io
    description: "A local-first CLI knowledge management tool"
    install: |
      bin.install "tmd"

release:
  github:
    owner: typemd
    name: typemd
