name: book
emoji: 📚
properties:
  - name: title
    type: string
    emoji: 📖
  - name: status
    type: select
    emoji: 📋
    options:
      - value: to-read
      - value: reading
      - value: done
  - name: rating
    type: number
    emoji: ⭐
  - name: published
    type: date
    emoji: 📅
  - name: favorite
    type: checkbox
    emoji: ❤️
  - name: tags
    type: multi_select
    emoji: 🔖
    options:
      - value: programming
      - value: devops
      - value: refactoring
      - value: go
      - value: management
  - name: author
    type: relation
    emoji: ✍️
    target: person
    bidirectional: true
    inverse: books
