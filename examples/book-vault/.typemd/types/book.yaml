name: book
emoji: 📚
properties:
  - name: title
    type: string
    emoji: 📖
  - name: status
    type: select
    emoji: 📋
    pin: 1
    options:
      - value: to-read
      - value: reading
      - value: done
  - name: rating
    type: number
    emoji: ⭐
    pin: 2
  - name: published
    type: date
    emoji: 📅
  - use: favorite
  - name: author
    type: relation
    emoji: ✍️
    target: person
    bidirectional: true
    inverse: books
