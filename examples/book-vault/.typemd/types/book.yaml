name: book
emoji: 📚
properties:
  - name: title
    type: string
  - name: status
    type: select
    options:
      - value: to-read
      - value: reading
      - value: done
  - name: rating
    type: number
  - name: published
    type: date
  - name: favorite
    type: checkbox
  - name: tags
    type: multi_select
    options:
      - value: programming
      - value: devops
      - value: refactoring
      - value: go
      - value: management
  - name: author
    type: relation
    target: person
    bidirectional: true
    inverse: books
